<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Time Log">
<meta name="theme-color" content="#EEF0EA">
<title>Time Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #EEF0EA;
    --surface: #F8F9F4;
    --surface-raised: #FFFFFF;
    --ink: #23261D;
    --ink-soft: #7C806F;
    --line: #DEE1D5;
    --moss: #5B6B4F;
    --moss-soft: #E4E9DD;
    --rust: #B5583E;
    --rust-soft: #F3E1DB;
    --radius: 20px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overscroll-behavior: none;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    min-height: 100dvh;
    padding: calc(var(--safe-top) + 18px) 20px calc(var(--safe-bottom) + 20px);
  }

  .brand {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 22px;
  }

  .brand h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 19px;
    font-weight: 600;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .brand .date {
    font-size: 12px;
    color: var(--ink-soft);
    font-weight: 500;
  }

  /* Total card */
  .total-card {
    background: var(--surface-raised);
    border-radius: var(--radius);
    padding: 28px 24px 24px;
    text-align: center;
    box-shadow: 0 1px 0 rgba(35,38,29,0.04);
    border: 1px solid var(--line);
    position: relative;
    overflow: hidden;
  }

  .total-card::before {
    content: "";
    position: absolute;
    top: -60%;
    left: 50%;
    transform: translateX(-50%);
    width: 220px;
    height: 220px;
    background: radial-gradient(circle, var(--moss-soft) 0%, transparent 70%);
    opacity: 0.9;
    pointer-events: none;
  }

  .total-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-soft);
    font-weight: 600;
    position: relative;
  }

  .total-value {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 56px;
    line-height: 1.05;
    margin-top: 6px;
    letter-spacing: -0.02em;
    position: relative;
  }

  .total-value span {
    font-size: 20px;
    font-weight: 600;
    color: var(--ink-soft);
    margin-left: 4px;
  }

  .total-sub {
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 4px;
    position: relative;
  }

  /* Category selector */
  .cat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    font-weight: 600;
    margin: 20px 2px 8px;
  }

  .cat-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .cat-btn {
    background: var(--surface-raised);
    border: 1.5px solid var(--line);
    border-radius: 14px;
    padding: 12px 0 10px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.12s ease, background 0.15s ease, border-color 0.15s ease;
    user-select: none;
  }

  .cat-btn:active { transform: scale(0.95); }

  .cat-btn .icon {
    font-size: 20px;
    display: block;
    margin-bottom: 3px;
  }

  .cat-btn .label {
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-soft);
  }

  .cat-btn.active {
    background: var(--moss-soft);
    border-color: var(--moss);
  }
  .cat-btn.active .label { color: var(--moss); }

  /* Log buttons */
  .log-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 8px;
  }

  .log-btn {
    background: var(--surface-raised);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 16px 0 14px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease;
    user-select: none;
  }

  .log-btn:active {
    transform: scale(0.95);
    background: var(--moss-soft);
    border-color: var(--moss);
  }

  .log-btn .num {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--moss);
    display: block;
  }

  .log-btn .unit {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    font-weight: 600;
  }

  .log-btn.flash {
    background: var(--moss);
    border-color: var(--moss);
  }
  .log-btn.flash .num, .log-btn.flash .unit { color: #fff; }

  /* History */
  .history-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 28px 0 10px;
  }

  .history-head h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 600;
    margin: 0;
  }

  .reset-btn {
    background: none;
    border: none;
    color: var(--rust);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 4px;
    cursor: pointer;
  }
  .reset-btn:active { opacity: 0.6; }

  .log-list {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow-y: auto;
    padding-bottom: 8px;
  }

  .log-item {
    background: var(--surface-raised);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .log-item .left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .log-item .cat-icon {
    font-size: 17px;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border-radius: 9px;
    flex-shrink: 0;
  }

  .log-item .cat-name {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    font-weight: 600;
    display: block;
  }

  .log-item .dur {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 15px;
  }

  .log-item .time {
    font-size: 12px;
    color: var(--ink-soft);
    font-weight: 500;
  }

  .empty {
    text-align: center;
    color: var(--ink-soft);
    font-size: 13px;
    padding: 40px 20px;
    line-height: 1.6;
  }

  .empty .glyph {
    font-size: 26px;
    display: block;
    margin-bottom: 8px;
    opacity: 0.6;
  }

  /* confirm sheet */
  .sheet-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(35,38,29,0.35);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
    z-index: 10;
  }
  .sheet-backdrop.show { opacity: 1; pointer-events: auto; }

  .sheet {
    background: var(--surface-raised);
    width: 100%;
    max-width: 480px;
    border-radius: 20px 20px 0 0;
    padding: 20px 20px calc(var(--safe-bottom) + 16px);
    transform: translateY(100%);
    transition: transform 0.25s ease;
  }
  .sheet-backdrop.show .sheet { transform: translateY(0); }

  .sheet p {
    font-size: 14px;
    color: var(--ink-soft);
    margin: 0 0 16px;
    text-align: center;
  }
  .sheet strong { color: var(--ink); }

  .sheet-btn {
    width: 100%;
    border: none;
    border-radius: 14px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    margin-top: 8px;
    cursor: pointer;
  }
  .sheet-btn.danger { background: var(--rust-soft); color: var(--rust); }
  .sheet-btn.cancel { background: var(--surface); color: var(--ink); }
</style>
</head>
<body>

  <div class="brand">
    <h1>⏱ Time Log</h1>
    <div class="date" id="dateLabel"></div>
  </div>

  <div class="total-card">
    <div class="total-label">Used Today</div>
    <div class="total-value" id="totalValue">0<span>min</span></div>
    <div class="total-sub" id="totalSub">Nothing logged yet</div>
  </div>

  <div class="cat-label">Category</div>
  <div class="cat-row" id="catRow">
    <div class="cat-btn active" data-cat="tv"><span class="icon">📺</span><span class="label">TV</span></div>
    <div class="cat-btn" data-cat="computer"><span class="icon">💻</span><span class="label">Computer</span></div>
    <div class="cat-btn" data-cat="phone"><span class="icon">📱</span><span class="label">Phone</span></div>
  </div>

  <div class="log-row">
    <div class="log-btn" data-min="15"><span class="num">15</span><span class="unit">min</span></div>
    <div class="log-btn" data-min="30"><span class="num">30</span><span class="unit">min</span></div>
    <div class="log-btn" data-min="60"><span class="num">60</span><span class="unit">min</span></div>
  </div>

  <div class="history-head">
    <h2>Today's Log</h2>
    <button class="reset-btn" id="resetBtn">Reset</button>
  </div>

  <div class="log-list" id="logList"></div>

  <div class="sheet-backdrop" id="sheetBackdrop">
    <div class="sheet">
      <p>Clear <strong id="sheetCount">0 entries</strong> and reset today's total to <strong>0 min</strong>?</p>
      <button class="sheet-btn danger" id="confirmReset">Reset today's log</button>
      <button class="sheet-btn cancel" id="cancelReset">Cancel</button>
    </div>
  </div>

<script>
  const STORAGE_KEY = 'timelog_v2';

  function todayKey() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function loadState() {
    let raw;
    try { raw = JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch(e) { raw = null; }
    const key = todayKey();
    if (!raw || raw.day !== key) {
      raw = { day: key, entries: [] };
      saveState(raw);
    }
    return raw;
  }

  function saveState(state) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  const CATEGORIES = {
    tv:       { icon: '📺', name: 'TV' },
    computer: { icon: '💻', name: 'Computer' },
    phone:    { icon: '📱', name: 'Phone' }
  };
  let activeCat = 'tv';

  const totalValue = document.getElementById('totalValue');
  const totalSub = document.getElementById('totalSub');
  const logList = document.getElementById('logList');
  const dateLabel = document.getElementById('dateLabel');
  const catRow = document.getElementById('catRow');

  dateLabel.textContent = new Date().toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });

  function formatTime(ts) {
    return new Date(ts).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
  }

  function render() {
    const total = state.entries.reduce((sum, e) => sum + e.minutes, 0);
    totalValue.innerHTML = total + '<span>min</span>';
    totalSub.textContent = state.entries.length
      ? state.entries.length + (state.entries.length === 1 ? ' entry logged' : ' entries logged')
      : 'Nothing logged yet';

    if (!state.entries.length) {
      logList.innerHTML = '<div class="empty"><span class="glyph">○</span>No activity logged today.<br>Pick a category, then tap 15, 30, or 60.</div>';
      return;
    }

    logList.innerHTML = state.entries
      .slice()
      .reverse()
      .map(e => {
        const cat = CATEGORIES[e.category] || CATEGORIES.tv;
        return `
        <div class="log-item">
          <span class="left">
            <span class="cat-icon">${cat.icon}</span>
            <span>
              <span class="cat-name">${cat.name}</span>
              <span class="dur">${e.minutes} min</span>
            </span>
          </span>
          <span class="time">${formatTime(e.ts)}</span>
        </div>
      `;
      }).join('');
  }

  function logMinutes(min, btnEl) {
    state.entries.push({ minutes: min, category: activeCat, ts: Date.now() });
    saveState(state);
    render();
    btnEl.classList.add('flash');
    setTimeout(() => btnEl.classList.remove('flash'), 180);
    if (navigator.vibrate) navigator.vibrate(8);
  }

  document.querySelectorAll('.log-btn').forEach(btn => {
    btn.addEventListener('click', () => logMinutes(parseInt(btn.dataset.min, 10), btn));
  });

  catRow.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCat = btn.dataset.cat;
      catRow.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (navigator.vibrate) navigator.vibrate(6);
    });
  });

  // reset flow
  const sheetBackdrop = document.getElementById('sheetBackdrop');
  const sheetCount = document.getElementById('sheetCount');

  document.getElementById('resetBtn').addEventListener('click', () => {
    const n = state.entries.length;
    sheetCount.textContent = n + (n === 1 ? ' entry' : ' entries');
    sheetBackdrop.classList.add('show');
  });

  document.getElementById('cancelReset').addEventListener('click', () => {
    sheetBackdrop.classList.remove('show');
  });

  sheetBackdrop.addEventListener('click', (e) => {
    if (e.target === sheetBackdrop) sheetBackdrop.classList.remove('show');
  });

  document.getElementById('confirmReset').addEventListener('click', () => {
    state.entries = [];
    saveState(state);
    render();
    sheetBackdrop.classList.remove('show');
  });

  // midnight rollover check while app stays open
  setInterval(() => {
    const key = todayKey();
    if (state.day !== key) {
      state = { day: key, entries: [] };
      saveState(state);
      dateLabel.textContent = new Date().toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
      render();
    }
  }, 60000);

  render();
</script>
</body>
</html>
